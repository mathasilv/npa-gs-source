# src/npags/config/decoder_schemas/agrosat.yaml
name: "AgroSat-IoT"
version: "3.3.1"
description: "Decoder para satélite AgroSat-IoT com nós terrestres"

# Configuração do header
# Nota: 'size' removido (calculado automaticamente pelo engine)
header:
  fields:
    - name: magic_byte_1
      type: uint8
      expected: 0xAB
      description: "Magic header byte 1"
    
    - name: magic_byte_2
      type: uint8
      expected: 0xCD
      description: "Magic header byte 2"
    
    - name: team_id
      type: uint16be
      description: "Team identification"

# Estrutura do payload
payload:
  # Dados do satélite
  - name: satellite
    fields:
      - name: battery_percent
        type: uint8
        description: "Nível de bateria"
        unit: "%"
      
      - name: temperature
        type: int16be
        scale: 0.1
        offset_value: -50.0
        description: "Temperatura"
        unit: "°C"
        format: "{:.1f}"
      
      - name: pressure
        type: int16be
        scale: 0.1
        offset_value: 300.0
        description: "Pressão atmosférica"
        unit: "hPa"
        format: "{:.1f}"
      
      - name: altitude
        type: uint16be
        description: "Altitude barométrica"
        unit: "m"
      
      - name: humidity
        type: uint8
        description: "Umidade relativa"
        unit: "%"
      
      - name: co2
        type: uint16be
        description: "Concentração CO2"
        unit: "ppm"
      
      - name: tvoc
        type: uint16be
        description: "Compostos orgânicos voláteis"
        unit: "ppb"
      
      - name: gyro_x
        type: int8
        scale: 2.0
        description: "Giroscópio X"
        unit: "°/s"
        format: "{:.1f}"
      
      - name: gyro_y
        type: int8
        scale: 2.0
        description: "Giroscópio Y"
        unit: "°/s"
        format: "{:.1f}"
      
      - name: gyro_z
        type: int8
        scale: 2.0
        description: "Giroscópio Z"
        unit: "°/s"
        format: "{:.1f}"
      
      - name: accel_x
        type: int8
        scale: 0.0625
        description: "Acelerômetro X"
        unit: "g"
        format: "{:.3f}"
      
      - name: accel_y
        type: int8
        scale: 0.0625
        description: "Acelerômetro Y"
        unit: "g"
        format: "{:.3f}"
      
      - name: accel_z
        type: int8
        scale: 0.0625
        description: "Acelerômetro Z"
        unit: "g"
        format: "{:.2f}"
      
      - name: latitude
        type: int32be
        scale: 0.0000001
        description: "Latitude GPS"
        unit: "°"
        format: "{:.6f}"
      
      - name: longitude
        type: int32be
        scale: 0.0000001
        description: "Longitude GPS"
        unit: "°"
        format: "{:.6f}"
      
      - name: gps_altitude
        type: uint16be
        description: "Altitude GPS"
        unit: "m"
      
      - name: satellites
        type: uint8
        description: "Satélites GPS"
      
      - name: system_status
        type: uint8
        description: "Status do sistema"
        mapping:
          0: "OK"
          1: "WIFI_ERROR"
          2: "SD_ERROR"
          4: "SENSOR_ERROR"
          8: "LORA_ERROR"
  
  # Contador de nós (lido primeiro)
  - name: node_count
    fields:
      - name: count
        type: uint8
        description: "Número de nós terrestres"
  
  # Nós terrestres (array dinâmico)
  - name: ground_nodes
    is_array: true
    count_field: "node_count.count"
    fields:
      - name: node_id
        type: uint16be
        description: "fID do nó"
      
      - name: soil_moisture
        type: uint8
        description: "Umidade do solo"
        unit: "%"
      
      - name: ambient_temp
        type: int16be
        scale: 0.1
        offset_value: -50.0
        description: "Temperatura ambiente"
        unit: "°C"
        format: "{:.1f}"
      
      - name: humidity
        type: uint8
        description: "Umidade do ar"
        unit: "%"
      
      - name: irrigation_status
        type: uint8
        description: "Status irrigação"
        mapping:
          0: "DESLIGADA"
          1: "LIGADA"
      
      - name: rssi
        type: uint8
        offset_value: -128
        description: "Força do sinal"
        unit: "dBm"
      
      - name: timestamp
        type: uint32be
        description: "Timestamp do nó"
        unit: "ms"